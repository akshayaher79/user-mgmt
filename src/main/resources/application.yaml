spring:
  application:
    name: user-mgmt-service
  datasource:
    name: user-db
    url: jdbc:postgresql://localhost:5432/user-db
    username: ${DB_USERNAME:app_user}
    password: ${DB_PASSWORD:letmein}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    root: INFO
    org.springframework.web: ${LOG_LEVEL:INFO}
